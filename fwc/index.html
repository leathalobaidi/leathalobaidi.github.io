<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fred Whitton Challenge — Training Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>

/* ============================================================  VARIABLES  */
[data-theme="dark"] {
  --bg:          #0c0c0c; --bg2: #141414; --bg3: #1a1a1a;
  --surface:     #202020; --surface2: #262626;
  --border:      #2e2e2e; --border2: #222;
  --text:        #f0ede8; --text-muted: #666; --text-dim: #3a3a3a;
  --accent:      #c8001e; --accent-glow: rgba(200,0,30,0.12);
  --toggle-bg:   #2e2e2e; --shadow: 0 1px 4px rgba(0,0,0,0.6);
  --chart-bg:    #111; --chart-grid: #222;
}
[data-theme="light"] {
  --bg:          #f7f4ef; --bg2: #eeebe4; --bg3: #e6e2da;
  --surface:     #dedad2; --surface2: #d5d0c8;
  --border:      #c8c3ba; --border2: #d5d0c8;
  --text:        #1a1614; --text-muted: #888; --text-dim: #c0bab2;
  --accent:      #c8001e; --accent-glow: rgba(200,0,30,0.08);
  --toggle-bg:   #c8c3ba; --shadow: 0 1px 4px rgba(0,0,0,0.1);
  --chart-bg:    #e6e2da; --chart-grid: #c8c3ba;
}

/* SESSION COLOURS — normal */
:root {
  --c-rest: #555;   --c-easy: #9ab8d0; --c-mod: #c8d8e8;
  --c-hard: #e0c880; --c-key: #f0ede8; --c-int: #e84060;
}
[data-theme="light"] {
  --c-rest: #aaa; --c-easy: #4070a0; --c-mod: #305080;
  --c-hard: #806000; --c-key: #1a1614; --c-int: #c8001e;
}

/* COLORBLIND SAFE — Wong palette */
[data-cb="true"] {
  --c-rest: #767676; --c-easy: #56B4E9; --c-mod: #0072B2;
  --c-hard: #E69F00; --c-key: #009E73; --c-int: #D55E00;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Barlow', sans-serif; font-size: 13px; line-height: 1.5;
  transition: background 0.35s, color 0.35s; min-height: 100vh;
  padding-bottom: 72px; /* room for today bar */
}

/* ============================================================  TOOLBAR  */
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 50px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  transition: background 0.35s, border-color 0.35s;
}
.brand { font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: 2px; color: var(--text); }
.brand span { color: var(--accent); }
.toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; }
.tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.toggle-wrap { display: flex; align-items: center; gap: 6px; }
.toggle-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
.toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.track { position: absolute; inset: 0; background: var(--toggle-bg); border-radius: 10px; transition: background 0.3s; }
.toggle input:checked + .track { background: var(--accent); }
.thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: var(--bg); border-radius: 50%; transition: transform 0.3s; pointer-events: none; }
.toggle input:checked ~ .thumb { transform: translateX(16px); }

.tb-btn {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: 3px;
  background: transparent; color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

/* ============================================================  HERO  */
.hero {
  background: var(--bg2); border-bottom: 3px solid var(--accent);
  padding: 44px 28px 36px;
  display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; flex-wrap: wrap;
  position: relative; overflow: hidden; transition: background 0.35s;
}
.hero::before {
  content: 'FWC'; position: absolute; right: -10px; bottom: -24px;
  font-family: 'Bebas Neue', cursive; font-size: 200px; line-height: 1;
  color: var(--accent); opacity: 0.05; pointer-events: none; user-select: none;
}
.hero-title { font-family: 'Bebas Neue', cursive; font-size: 72px; line-height: 0.92; color: var(--text); letter-spacing: 1px; }
.hero-title span { color: var(--accent); display: block; }
.hero-sub { margin-top: 12px; font-size: 13px; color: var(--text-muted); max-width: 360px; line-height: 1.7; }
.cd-block { text-align: right; }
.cd-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
.cd-num { font-family: 'Bebas Neue', cursive; font-size: 72px; line-height: 1; color: var(--accent); }
.cd-date { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

/* ============================================================  PROGRESS  */
.prog-wrap {
  background: var(--bg3); border-bottom: 1px solid var(--border);
  padding: 12px 28px; display: flex; align-items: center; gap: 14px; transition: background 0.35s;
}
.prog-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; min-width: 100px; }
.prog-outer { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-inner { height: 100%; background: linear-gradient(90deg, #880010, var(--accent)); border-radius: 2px; transition: width 1.2s ease; }
.prog-pct { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: var(--accent); min-width: 32px; text-align: right; }

/* ============================================================  TAB NAV  */
.tab-nav {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 28px; display: flex; align-items: flex-end; gap: 0;
  transition: background 0.35s, border-color 0.35s;
}
.tab-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 12px 18px 11px; background: transparent;
  border: none; border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: color 0.2s, border-color 0.2s; margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-icon { font-size: 13px; }
.view-panel { display: none; }
.view-panel.active { display: block; }

/* ============================================================  FILTER BAR  */
.filter-bar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 28px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; transition: background 0.35s;
}
.filter-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-right: 2px; white-space: nowrap; }
.f-btn {
  display: flex; align-items: center; gap: 5px; padding: 4px 11px;
  border: 1px solid var(--border); border-radius: 20px; background: transparent;
  color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
}
.f-btn:hover { border-color: var(--text-muted); color: var(--text); }
.f-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--text); }
.f-dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-rest { background: var(--c-rest); } .dot-easy { background: var(--c-easy); }
.dot-mod  { background: var(--c-mod); }  .dot-hard { background: var(--c-hard); }
.dot-key  { background: var(--c-key); }  .dot-int  { background: var(--c-int); }

.expand-controls { margin-left: auto; display: flex; gap: 5px; }
.ec-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 3px; background: transparent; color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.ec-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ============================================================  LIST VIEW  */
.plan { padding: 24px 28px 40px; max-width: 900px; display: flex; flex-direction: column; gap: 12px; }

.month-block {}
.month-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; user-select: none; transition: background 0.2s, border-color 0.2s; gap: 12px;
}
.month-toggle:hover { border-color: var(--accent); background: var(--bg3); }
.month-toggle.open  { border-color: var(--accent); border-radius: 6px 6px 0 0; }
.month-left { display: flex; align-items: center; gap: 14px; }
.month-name-lbl { font-family: 'Bebas Neue', cursive; font-size: 32px; letter-spacing: 1px; color: var(--text); line-height: 1; }
.month-pill { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); background: var(--accent-glow); border: 1px solid var(--accent); padding: 2px 9px; border-radius: 10px; opacity: 0.85; }
.month-stats { display: flex; align-items: center; gap: 10px; }
.mstat { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
.mstat strong { color: var(--text); font-weight: 600; }
.chevron { width: 14px; height: 14px; border-right: 2px solid var(--text-muted); border-bottom: 2px solid var(--text-muted); transform: rotate(-45deg); transition: transform 0.3s, border-color 0.2s; flex-shrink: 0; }
.month-toggle.open .chevron { transform: rotate(45deg); border-color: var(--accent); }
.month-body { display: none; background: var(--bg3); border: 1px solid var(--accent); border-top: none; border-radius: 0 0 6px 6px; padding: 8px 12px 12px; flex-direction: column; gap: 6px; }
.month-body.open { display: flex; }

.week-block {}
.week-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--surface); border: 1px solid var(--border2); border-radius: 4px;
  cursor: pointer; user-select: none; transition: background 0.15s, border-color 0.2s; gap: 10px;
}
.week-toggle:hover { border-color: var(--border); }
.week-toggle.open { border-radius: 4px 4px 0 0; border-color: var(--border); }
.week-left { display: flex; align-items: center; gap: 12px; }
.week-num { font-family: 'Bebas Neue', cursive; font-size: 22px; color: var(--accent); line-height: 1; min-width: 38px; }
.week-summary { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.ws-dot { width: 6px; height: 6px; border-radius: 50%; }
.week-mileage { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-left: 4px; }
.week-tss { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: var(--text-muted); margin-left: 2px; }
.wk-chevron { width: 11px; height: 11px; border-right: 1.5px solid var(--text-muted); border-bottom: 1.5px solid var(--text-muted); transform: rotate(-45deg); transition: transform 0.25s, border-color 0.2s; flex-shrink: 0; }
.week-toggle.open .wk-chevron { transform: rotate(45deg); border-color: var(--accent); }
.week-body { display: none; background: var(--surface2); border: 1px solid var(--border2); border-top: none; border-radius: 0 0 4px 4px; flex-direction: column; }
.week-body.open { display: flex; }

/* SESSION ROW */
.session-row {
  display: flex; align-items: stretch; gap: 0;
  border-bottom: 1px solid var(--border2); transition: background 0.2s;
  position: relative;
}
.session-row:last-child { border-bottom: none; }
.session-row:hover { background: rgba(255,255,255,0.02); }
.session-row.is-today { background: var(--accent-glow) !important; }
.session-row.done-row .session-title::after { content: ' ✓'; color: var(--c-key); opacity: 0.7; font-size: 11px; }

.session-day {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted); min-width: 96px; padding: 12px 14px;
  border-right: 1px solid var(--border2); flex-shrink: 0; line-height: 1;
}
.session-bar { width: 3px; align-self: stretch; flex-shrink: 0; }
.session-content { flex: 1; padding: 10px 14px; display: flex; flex-direction: column; gap: 3px; }
.session-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.session-badge {
  font-family: 'Barlow Condensed', sans-serif; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px; border: 1px solid; line-height: 1.4; flex-shrink: 0;
}
.session-title { font-size: 13px; }
.session-meta { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--text-muted); }

/* session actions: complete + note */
.session-actions { display: flex; align-items: center; gap: 8px; padding: 10px 12px; flex-shrink: 0; }
.sess-done {
  width: 18px; height: 18px; border-radius: 3px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent; transition: all 0.2s; flex-shrink: 0;
}
.sess-done:hover { border-color: var(--c-key); }
.sess-done.checked { background: var(--c-key); border-color: var(--c-key); color: var(--bg); }
[data-cb="true"] .sess-done.checked { background: var(--c-key); border-color: var(--c-key); }
.note-btn {
  width: 20px; height: 20px; border: none; background: transparent; cursor: pointer;
  color: var(--text-muted); font-size: 13px; display: flex; align-items: center; justify-content: center;
  border-radius: 3px; transition: color 0.2s; padding: 0; flex-shrink: 0;
}
.note-btn:hover { color: var(--text); }
.note-btn.has-note { color: var(--c-hard); }

.note-area {
  display: none; padding: 8px 14px 12px 96px; background: var(--bg3);
  border-top: 1px solid var(--border2);
}
.note-area.open { display: block; }
.note-area textarea {
  width: 100%; min-height: 52px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 12px;
  padding: 8px 10px; resize: vertical; outline: none; transition: border-color 0.2s;
  line-height: 1.5;
}
.note-area textarea:focus { border-color: var(--accent); }
.note-area textarea::placeholder { color: var(--text-muted); }

.session-row.hidden  { display: none !important; }
.week-block.wk-hidden { display: none !important; }

/* SESSION TYPE STYLES */
.type-rest .session-bar { background: var(--c-rest); }
.type-easy .session-bar { background: var(--c-easy); }
.type-mod  .session-bar { background: var(--c-mod); }
.type-hard .session-bar { background: var(--c-hard); }
.type-key  .session-bar { background: var(--c-key); }
.type-int  .session-bar { background: var(--c-int); }

.type-rest .session-title { color: var(--text-muted); font-style: italic; }
.type-easy .session-title { color: var(--c-easy); }
.type-mod  .session-title { color: var(--c-mod); }
.type-hard .session-title { color: var(--c-hard); }
.type-key  .session-title { color: var(--c-key); }
.type-int  .session-title { color: var(--c-int); }

.type-rest .session-badge { background: rgba(85,85,85,0.12); color: var(--c-rest); border-color: rgba(85,85,85,0.25); }
.type-easy .session-badge { background: rgba(154,184,208,0.12); color: var(--c-easy); border-color: rgba(154,184,208,0.25); }
.type-mod  .session-badge { background: rgba(200,216,232,0.12); color: var(--c-mod);  border-color: rgba(200,216,232,0.25); }
.type-hard .session-badge { background: rgba(224,200,128,0.12); color: var(--c-hard); border-color: rgba(224,200,128,0.25); }
.type-key  .session-badge { background: rgba(240,237,232,0.10); color: var(--c-key);  border-color: rgba(240,237,232,0.2); }
.type-int  .session-badge { background: rgba(232,64,96,0.12);   color: var(--c-int);  border-color: rgba(232,64,96,0.25); }
.race-badge-cell .session-badge { background: rgba(200,0,30,0.2); color: var(--accent); border-color: rgba(200,0,30,0.4); }
.race-badge-cell { background: rgba(200,0,30,0.06) !important; }
.race-badge-cell .session-title { color: var(--accent) !important; font-weight: 500; }
.race-badge-cell .session-day { color: var(--accent); }

/* ============================================================  CALENDAR VIEW  */
.cal-wrap { padding: 28px 28px 40px; display: flex; flex-direction: column; gap: 40px; }
.cal-month-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; border-left: 3px solid var(--accent); padding-left: 16px; }
.cal-month-name { font-family: 'Bebas Neue', cursive; font-size: 42px; line-height: 1; text-transform: uppercase; color: var(--text); }
.cal-month-pill { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); background: var(--accent-glow); border: 1px solid var(--accent); padding: 2px 9px; border-radius: 10px; opacity: 0.85; }
.cal-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.cal-table th { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 10px 10px; text-align: left; border-bottom: 2px solid var(--border); background: var(--bg3); font-weight: 600; }
.cal-table th.wk-th { width: 36px; text-align: center; color: var(--accent); }
.cal-table th:not(.wk-th) { width: calc((100% - 36px) / 7); }
.cal-table td { padding: 10px 10px; vertical-align: top; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
.cal-table td:last-child { border-right: none; }
.cal-table tr:hover td { background: rgba(255,255,255,0.02); }
.cal-table td.wk-num { font-family: 'Bebas Neue', cursive; font-size: 18px; color: var(--accent); text-align: center; vertical-align: middle; background: rgba(200,0,30,0.04); border-right: 1px solid var(--border); cursor: default; }
.cal-table td.is-today { background: var(--accent-glow) !important; }
.cal-cell { display: flex; flex-direction: column; gap: 3px; }
.cal-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; border: 1px solid; display: inline-block; line-height: 1.4; align-self: flex-start; }
.cal-title { font-size: 11.5px; line-height: 1.35; }
.cal-meta  { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: var(--text-muted); }

/* cal type colours */
.ct-rest .cal-title { color: var(--text-muted); font-style: italic; }
.ct-easy .cal-title, .ct-mod .cal-title, .ct-hard .cal-title, .ct-key .cal-title, .ct-int .cal-title { color: var(--text); }
.ct-easy .cal-badge { background: rgba(154,184,208,0.12); color: var(--c-easy); border-color: rgba(154,184,208,0.25); }
.ct-mod  .cal-badge { background: rgba(200,216,232,0.12); color: var(--c-mod);  border-color: rgba(200,216,232,0.25); }
.ct-hard .cal-badge { background: rgba(224,200,128,0.12); color: var(--c-hard); border-color: rgba(224,200,128,0.25); }
.ct-key  .cal-badge { background: rgba(240,237,232,0.10); color: var(--c-key);  border-color: rgba(240,237,232,0.2); }
.ct-int  .cal-badge { background: rgba(232,64,96,0.12);   color: var(--c-int);  border-color: rgba(232,64,96,0.25); }
.ct-rest .cal-badge { background: rgba(85,85,85,0.12); color: var(--c-rest); border-color: rgba(85,85,85,0.25); }

/* left accent strip per type */
.ct-easy td, .ct-mod td, .ct-hard td, .ct-key td, .ct-int td { border-left: 2px solid transparent; }
.cal-table td.ct-easy { border-left: 2px solid var(--c-easy); }
.cal-table td.ct-mod  { border-left: 2px solid var(--c-mod); }
.cal-table td.ct-hard { border-left: 2px solid var(--c-hard); }
.cal-table td.ct-key  { border-left: 2px solid var(--c-key); }
.cal-table td.ct-int  { border-left: 2px solid var(--c-int); }

.ct-race { background: rgba(200,0,30,0.06) !important; border-left: 2px solid var(--accent) !important; }
.ct-race .cal-badge { background: rgba(200,0,30,0.2); color: var(--accent); border-color: rgba(200,0,30,0.4); }
.ct-race .cal-title { color: var(--accent); font-weight: 500; }

/* cal tooltip */
.cal-tooltip {
  position: fixed; z-index: 200; background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 10px 14px; font-size: 12px; max-width: 220px; pointer-events: none;
  box-shadow: var(--shadow); display: none; line-height: 1.6;
}
.cal-tooltip.visible { display: block; }
.cal-tt-title { font-weight: 500; color: var(--text); margin-bottom: 4px; }
.cal-tt-meta  { color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; }

/* ============================================================  STATS VIEW  */
.stats-wrap { padding: 28px 28px 40px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 16px 18px; }
.stat-card-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.stat-card-val { font-family: 'Bebas Neue', cursive; font-size: 36px; line-height: 1; color: var(--accent); }
.stat-card-unit { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.chart-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 20px; margin-bottom: 24px; }
.chart-title { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
.chart-container { width: 100%; overflow-x: auto; }
.chart-svg { display: block; }

/* ============================================================  TODAY BAR  */
.today-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 10px 28px; display: flex; align-items: center; gap: 14px;
  transition: background 0.35s, border-color 0.35s;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.3);
}
[data-theme="light"] .today-bar { box-shadow: 0 -2px 8px rgba(0,0,0,0.1); }
.today-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; min-width: 90px; }
.today-sessions { display: flex; align-items: center; gap: 6px; flex: 1; flex-wrap: wrap; }
.today-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border);
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-muted); background: var(--bg3); white-space: nowrap;
}
.today-pill.today-active { border-color: var(--accent); background: var(--accent-glow); color: var(--text); }
.today-pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.jump-btn {
  padding: 5px 14px; background: var(--accent); border: none; border-radius: 3px;
  color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.2s; white-space: nowrap; flex-shrink: 0;
}
.jump-btn:hover { opacity: 0.85; }
.today-week-lbl { font-family: 'Bebas Neue', cursive; font-size: 18px; color: var(--accent); flex-shrink: 0; }

/* ============================================================  PRINT  */
@media print {
  body { background: #fff !important; color: #000 !important; padding-bottom: 0; font-size: 11px; }
  .toolbar, .today-bar, .filter-bar, .tab-nav, .prog-wrap, .hero::before,
  .expand-controls, .session-actions, .note-area, .note-btn, .sess-done,
  .cal-tooltip, .stats-wrap { display: none !important; }
  .hero { background: #fff !important; border-bottom: 2px solid #000 !important; padding: 20px 20px 16px; }
  .hero-title { font-size: 48px; color: #000 !important; }
  .hero-title span { color: #c8001e !important; }
  .hero-sub { color: #444 !important; }
  .cd-num, .cd-lbl, .cd-date { display: none; }
  .view-panel { display: block !important; }
  .month-body { display: flex !important; border: 1px solid #ccc !important; }
  .month-toggle { background: #f0f0f0 !important; border: 1px solid #ccc !important; page-break-after: avoid; }
  .month-toggle.open { border-radius: 6px 6px 0 0 !important; }
  .week-body { display: flex !important; border: 1px solid #eee !important; }
  .week-toggle { background: #f8f8f8 !important; border: 1px solid #eee !important; page-break-after: avoid; }
  .session-row { border-bottom: 1px solid #eee !important; }
  .session-day { color: #666 !important; border-right: 1px solid #eee !important; }
  .session-title { color: #000 !important; }
  .cal-table th { background: #f0f0f0 !important; color: #444 !important; border-bottom: 1px solid #ccc !important; }
  .cal-table td { border-color: #eee !important; }
  .cal-wrap { display: none; } /* print list only */
  #view-list { display: block !important; }
  #view-cal, #view-stats { display: none !important; }
  .tab-btn { display: none; }
  .plan { padding: 12px 0; }
  .cal-month-header { border-left-color: #c8001e !important; }
  @page { margin: 15mm; }
}

/* ============================================================  RESPONSIVE  */
@media (max-width: 700px) {
  .hero { padding: 28px 16px 24px; } .hero-title { font-size: 52px; } .cd-num { font-size: 52px; }
  .plan { padding: 16px 12px 40px; } .filter-bar { padding: 8px 12px; } .prog-wrap { padding: 10px 12px; }
  .toolbar { padding: 0 12px; } .session-day { min-width: 70px; font-size: 9px; }
  .expand-controls { display: none; } .cal-wrap { padding: 16px 8px 40px; }
  .cal-table { display: block; overflow-x: auto; } .stats-wrap { padding: 16px 12px 40px; }
  .today-bar { padding: 8px 12px; gap: 8px; } .toolbar-right { gap: 6px; }
  .tb-sep { display: none; }
}

/* ============================================================  VISUAL ENHANCEMENTS  */

/* Pulsing today row */
@keyframes todayPulse {
  0%,100% { box-shadow: inset 2px 0 0 var(--accent), 0 0 0 rgba(200,0,30,0); }
  50%      { box-shadow: inset 2px 0 0 var(--accent), 0 0 12px rgba(200,0,30,0.18); }
}
.session-row.is-today {
  background: var(--accent-glow) !important;
  animation: todayPulse 2.5s ease-in-out infinite;
}

/* Session row fade-in when week opens */
@keyframes rowFadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.week-body.open > div {
  animation: rowFadeIn 0.22s ease both;
}
.week-body.open > div:nth-child(1) { animation-delay: 0.02s; }
.week-body.open > div:nth-child(2) { animation-delay: 0.05s; }
.week-body.open > div:nth-child(3) { animation-delay: 0.08s; }
.week-body.open > div:nth-child(4) { animation-delay: 0.11s; }
.week-body.open > div:nth-child(5) { animation-delay: 0.14s; }
.week-body.open > div:nth-child(6) { animation-delay: 0.17s; }
.week-body.open > div:nth-child(7) { animation-delay: 0.20s; }

/* Ramp rate warning badge */
.ramp-warn {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
  color: #e0c880; border: 1px solid rgba(224,200,128,0.35); background: rgba(224,200,128,0.08);
  padding: 1px 6px; border-radius: 2px; margin-left: 4px;
}
.ramp-ok {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 8px; letter-spacing: 1px;
  color: var(--text-muted); padding: 1px 4px;
}

/* Elevation sparkline */
.elev-sparkline {
  display: inline-block; vertical-align: middle;
  margin-left: 10px; opacity: 0.75;
}
.elev-sparkline:hover { opacity: 1; }

/* Session row sparkline area */
.session-row .session-actions { align-items: center; }

/* Hero silhouette */
.hero-silhouette {
  position: absolute; bottom: 0; left: 0; right: 0;
  pointer-events: none; user-select: none;
}
.hero-silhouette svg { display: block; }

/* Animated chart bars via CSS */
@keyframes barGrow {
  from { transform: scaleY(0); transform-origin: bottom; }
  to   { transform: scaleY(1); transform-origin: bottom; }
}
.chart-bar-animate {
  animation: barGrow 0.6s cubic-bezier(0.22,0.61,0.36,1) both;
}

/* Week toggle ramp indicator dot */
.ramp-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-left: 2px;
}
.ramp-dot.ramp-high { background: #e0c880; }
.ramp-dot.ramp-ok   { background: var(--c-easy); opacity: 0.5; }

/* Progress bar animate on load */
@keyframes progGrow {
  from { width: 0%; }
}
.prog-inner { animation: progGrow 1.4s cubic-bezier(0.22,0.61,0.36,1) both; }

/* Key ride row — sparkline in meta */
.session-row.has-sparkline .session-content { padding-bottom: 10px; }

/* Tooltip in list view */
.list-tooltip {
  position: absolute; right: 52px; top: 50%; transform: translateY(-50%);
  background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
  padding: 5px 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px;

}
.session-row:hover .list-tooltip { display: block; }

/* Smooth chart SVG transition */
#chartSvg rect.chart-bar { transition: height 0.5s cubic-bezier(0.22,0.61,0.36,1), y 0.5s cubic-bezier(0.22,0.61,0.36,1); }

function today0() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function fmtDist(mi) {
  if (mi === null || mi === undefined) return '';
  if (typeof mi === 'string' && mi.includes('-')) {
    const [lo,hi] = mi.split('-').map(Number);
    return useKm ? `${Math.round(lo*MI_TO_KM)}–${Math.round(hi*MI_TO_KM)} km` : `${lo}–${hi} miles`;
  }
  const v = Number(mi);
  return useKm ? `${Math.round(v * MI_TO_KM)} km` : `${v} miles`;
}

function fmtElev(m) {
  if (!m) return '';
  return useKm ? `< ${Math.round(m)} m gain` : `< ${Math.round(m * M_TO_FT).toLocaleString()} ft gain`;
}

function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k,v); } catch(e) {} }

function buildSparkline(profile, color, w=90, h=24) {
  if (!profile) return '';
  const pad = 2;
  const pts = profile.map(([x,y]) => {
    const px = pad + x * (w - pad*2);
    const py = h - pad - y * (h - pad*2);
    return `${px.toFixed(1)},${py.toFixed(1)}`;
  }).join(' ');
  // filled area: close to bottom
  const first = profile[0], last = profile[profile.length-1];
  const areaFirst = `${(pad + first[0]*(w-pad*2)).toFixed(1)},${h-pad}`;
  const areaLast  = `${(pad + last[0]*(w-pad*2)).toFixed(1)},${h-pad}`;
  const areaPath  = `M${areaFirst} L${pts.split(' ').map(p=>p).join(' L')} L${areaLast} Z`;

  const col = color || 'rgba(200,0,30,0.6)';
  const fillCol = color ? color.replace('0.6','0.12').replace('0.8','0.12') : 'rgba(200,0,30,0.10)';

  return `<svg class="elev-sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" title="Elevation profile">
    <path d="${areaPath}" fill="${fillCol}"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>`;
}

        // tooltip
        td.addEventListener('mouseenter', e => {
          const tip = document.getElementById('calTip');
          tip.classList.add('visible');
          document.getElementById('calTipTitle').textContent = `${sess.day} — ${sess.badge}`;
          let meta = sess.title;

          meta += `  ·  TSS ~${sess.tss}`;

          positionTip(e);
        });
        td.addEventListener('mousemove', positionTip);
        td.addEventListener('mouseleave', () => document.getElementById('calTip').classList.remove('visible'));

        tr.append(td);
      });

      tbody.append(tr);
    });

    table.append(tbody);
    section.append(table);

  });

function positionTip(e) {
  const tip = document.getElementById('calTip');
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + 240 > window.innerWidth) x = e.clientX - 240;
  if (y + 80 > window.innerHeight) y = e.clientY - 80;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}

function renderStats() {
  const allSessions = WEEKS.flatMap(w => w.days);
  const totalMi = allSessions.reduce((s,d) => s + (d.mi||0), 0);
  const totalTss = WEEKS.reduce((s,w) => s + w.tss, 0);
  const doneSessions = allSessions.filter(d => lsGet('fwc-done-'+d.date) === '1').length;
  const notedSessions = allSessions.filter(d => !!lsGet('fwc-note-'+d.date)).length;
  const rides = allSessions.filter(d => d.type !== 'rest').length;

  const grid = document.getElementById('statsGrid');
  grid.innerHTML = [
    {lbl:'Total Distance', val: useKm ? Math.round(totalMi*MI_TO_KM)+' km' : totalMi+' mi', unit:'over 12 weeks'},
    {lbl:'Total TSS',       val: totalTss, unit: 'training stress score'},
    {lbl:'Training Days',   val: rides, unit: 'sessions (excl. rest)'},
    {lbl:'Completed',       val: doneSessions, unit: `of ${allSessions.length} sessions`},
    {lbl:'Sessions Noted',  val: notedSessions, unit: 'with journal entries'},

  drawChart();
  drawDonut();
}

  const svg = document.getElementById('chartSvg');
  const W = Math.max(svg.parentElement.clientWidth, 560);
  const H = 180, PAD = {top:16, right:20, bottom:40, left:48};
  const iW = W - PAD.left - PAD.right;
  const iH = H - PAD.top - PAD.bottom;

  const maxMi = Math.max(...WEEKS.map(w => w.mi));
  const maxTss = Math.max(...WEEKS.map(w => w.tss));
  const bW = iW / WEEKS.length;

  const todayTs = +today0();
  const planStartTs = +PLAN_START;
  const planEndTs = +RACE_DATE;
  const todayPct = Math.min(1, Math.max(0, (todayTs - planStartTs)/(planEndTs-planStartTs)));

  let out = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // bg
  out += `<rect width="${W}" height="${H}" fill="none"/>`;

  // month bands
  const monthColors = {'February':'rgba(200,0,30,0.04)','March':'rgba(200,0,30,0.07)','April':'rgba(200,0,30,0.03)'};
  MONTHS.forEach(m => {
    const wks = WEEKS.filter(w => m.weeks.includes(w.num));
    const x0 = PAD.left + (wks[0].num-1) * bW;
    const x1 = PAD.left + wks[wks.length-1].num * bW;
    out += `<rect x="${x0}" y="${PAD.top}" width="${x1-x0}" height="${iH}" fill="${monthColors[m.name]||'none'}"/>`;
    out += `<text x="${(x0+x1)/2}" y="${H-6}" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" letter-spacing="1" fill="currentColor" opacity="0.4">${m.name.toUpperCase()}</text>`;
  });

  // y-axis grid
  [0.25,0.5,0.75,1].forEach(t => {
    const y = PAD.top + iH * (1-t);
    out += `<line x1="${PAD.left}" y1="${y}" x2="${PAD.left+iW}" y2="${y}" stroke="currentColor" stroke-opacity="0.08" stroke-width="1"/>`;
    const label = Math.round(maxMi * t);
    out += `<text x="${PAD.left-6}" y="${y+4}" text-anchor="end" font-family="Barlow Condensed,sans-serif" font-size="9" fill="currentColor" opacity="0.4">${useKm ? Math.round(label*MI_TO_KM) : label}</text>`;
  });

  // bars
  WEEKS.forEach((wk,i) => {
    const x = PAD.left + i * bW + bW*0.15;
    const barW = bW * 0.7;
    const barH = (wk.mi / maxMi) * iH;
    const y = PAD.top + iH - barH;
    const wkDates = wk.days.map(d => +new Date(d.date));
    const isPast = wkDates[wkDates.length-1] < todayTs;
    const isCurr = wkDates.some(d => d >= todayTs) && wkDates[0] <= todayTs;
    const done = wk.days.filter(d => lsGet('fwc-done-'+d.date)==='1').length;
    const doneH = wk.days.length ? (done/wk.days.length) * barH : 0;
    const col = isCurr ? 'rgba(200,0,30,0.9)' : isPast ? 'rgba(200,0,30,0.3)' : 'rgba(200,0,30,0.5)';
    out += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${col}" rx="2" style="transform-origin:${x+barW/2}px ${PAD.top+iH}px; animation: barGrow 0.5s cubic-bezier(0.22,0.61,0.36,1) ${(i*0.04).toFixed(2)}s both"/>`;
    // completion overlay
    if (doneH > 0) {
      out += `<rect x="${x}" y="${PAD.top+iH-doneH}" width="${barW}" height="${doneH}" fill="rgba(200,0,30,0.15)" rx="2" stroke="rgba(200,0,30,0.6)" stroke-width="0.5"/>`;
    }
    out += `<text x="${x+barW/2}" y="${H-28}" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" fill="currentColor" opacity="0.5">${wk.label}</text>`;
  });

  // TSS line
  const tssPts = WEEKS.map((wk,i) => {
    const x = PAD.left + i * bW + bW*0.5;
    const y = PAD.top + iH * (1 - wk.tss/maxTss);
    return `${x},${y}`;
  }).join(' ');
  out += `<polyline points="${tssPts}" fill="none" stroke="rgba(224,200,128,0.6)" stroke-width="1.5" stroke-dasharray="4 2"/>`;
  WEEKS.forEach((wk,i) => {
    const x = PAD.left + i*bW + bW*0.5;
    const y = PAD.top + iH*(1-wk.tss/maxTss);
    out += `<circle cx="${x}" cy="${y}" r="2.5" fill="rgba(224,200,128,0.8)"/>`;
  });

  // today line
  const todayX = PAD.left + todayPct * iW;
  if (todayPct > 0 && todayPct < 1) {
    out += `<line x1="${todayX}" y1="${PAD.top}" x2="${todayX}" y2="${PAD.top+iH}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>`;
    out += `<text x="${todayX+4}" y="${PAD.top+12}" font-family="Barlow Condensed,sans-serif" font-size="9" fill="var(--accent)" opacity="0.8">TODAY</text>`;
  }

  // legend
  out += `<rect x="${W-140}" y="${PAD.top}" width="10" height="10" fill="rgba(200,0,30,0.5)" rx="1"/>`;
  out += `<text x="${W-126}" y="${PAD.top+9}" font-family="Barlow Condensed,sans-serif" font-size="9" fill="currentColor" opacity="0.5">${useKm?'KM':'MILES'}</text>`;
  out += `<line x1="${W-140}" y1="${PAD.top+22}" x2="${W-128}" y2="${PAD.top+22}" stroke="rgba(224,200,128,0.7)" stroke-width="1.5" stroke-dasharray="4 2"/>`;
  out += `<text x="${W-124}" y="${PAD.top+26}" font-family="Barlow Condensed,sans-serif" font-size="9" fill="currentColor" opacity="0.5">TSS</text>`;

  // Add CSS animation keyframes inline for bars
  const animDefs = `<defs><style>
    @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  </style></defs>`;
  out = out.replace('<rect width=', animDefs + '<rect width=');

  out += '</svg>';
  svg.outerHTML = out;
}

function drawDonut() {
  const svg = document.getElementById('donutSvg');
  if (!svg) return;
  const W = Math.min(svg.parentElement.clientWidth, 480), H = 160;
  const cx = 80, cy = H/2, r = 55;

  const types = ['easy','mod','hard','key','int','rest'];
  const labels = {easy:'Easy',mod:'Moderate',hard:'Long Ride',key:'Key Ride',int:'Intervals',rest:'Rest'};
  const counts = {};
  types.forEach(t => { counts[t] = 0; });
  WEEKS.forEach(w => w.days.forEach(d => { counts[d.type] = (counts[d.type]||0)+1; }));

  const total = Object.values(counts).reduce((a,b) => a+b, 0);
  let angle = -Math.PI/2;
  let paths = '';
  let legend = '';
  const colVars = {easy:'--c-easy',mod:'--c-mod',hard:'--c-hard',key:'--c-key',int:'--c-int',rest:'--c-rest'};

  types.forEach((t,i) => {
    const pct = counts[t] / total;
    if (pct === 0) return;
    const a1 = angle, a2 = angle + pct * 2 * Math.PI;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    const lg = a2-a1 > Math.PI ? 1 : 0;
    paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} Z" fill="var(${colVars[t]})" opacity="0.8"/>`;
    angle = a2;
    const ly = 30 + i*22;
    legend += `<rect x="${cx*2+20}" y="${ly}" width="10" height="10" fill="var(${colVars[t]})" rx="2" opacity="0.8"/>`;
    legend += `<text x="${cx*2+36}" y="${ly+9}" font-family="Barlow Condensed,sans-serif" font-size="11" fill="currentColor" opacity="0.7">${labels[t]} — ${counts[t]}</text>`;
  });

  const out = `<svg id="donutSvg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="currentColor" stroke-opacity="0.05" stroke-width="1"/>
    ${paths}
    <circle cx="${cx}" cy="${cy}" r="${r*0.5}" fill="var(--bg2)"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-family="Bebas Neue,cursive" font-size="20" fill="currentColor">${total}</text>
    <text x="${cx}" y="${cy+10}" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" letter-spacing="1" fill="currentColor" opacity="0.5">SESSIONS</text>
    ${legend}
  </svg>`;
  svg.outerHTML = out;
}

// ============================================================
//  TODAY BAR
// ============================================================
function renderTodayBar() {
  const tod = today0();
  let currentWeek = null;
  WEEKS.forEach(w => {
    const dates = w.days.map(d => +new Date(d.date));
    if (dates[0] <= +tod && +tod <= dates[dates.length-1]) currentWeek = w;
    if (!currentWeek && dates[0] > +tod && !currentWeek) {
      // upcoming week
    }
  });
  if (!currentWeek) {
    // find next upcoming
    currentWeek = WEEKS.find(w => +new Date(w.days[0].date) > +tod) || WEEKS[WEEKS.length-1];
  }

  const weekLbl = document.getElementById('todayWeekLbl');
  const sessDiv = document.getElementById('todaySessions');

  weekLbl.textContent = currentWeek.label;
  sessDiv.innerHTML = '';

  currentWeek.days.forEach(sess => {
    const d = new Date(sess.date);
    const isToday = +d === +tod;
    const pill = document.createElement('div');
    pill.className = 'today-pill' + (isToday ? ' today-active' : '');
    const dayAbbr = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    pill.innerHTML = `<span class="today-pill-dot" style="background:var(--c-${sess.type})"></span>${dayAbbr} ${d.getDate()} · ${sess.badge}`;
    sessDiv.append(pill);
  });
}

// ============================================================
//  JUMP TO TODAY
// ============================================================
function jumpToToday() {
  switchTab('list');
  const tod = today0();
  // open month + week containing today (or nearest future)
  let targetRow = null;
  document.querySelectorAll('.session-row[data-date]').forEach(row => {
    const d = new Date(row.dataset.date);
    if (+d === +tod && !targetRow) targetRow = row;
  });
  if (!targetRow) {
    // find nearest upcoming
    let nearest = null, nearestDiff = Infinity;
    document.querySelectorAll('.session-row[data-date]').forEach(row => {
      const d = new Date(row.dataset.date);
      const diff = +d - +tod;
      if (diff >= 0 && diff < nearestDiff) { nearestDiff = diff; nearest = row; }
    });
    targetRow = nearest;
  }
  if (!targetRow) return;

  // open the month and week
  const wkBody = targetRow.closest('.week-body');
  const monthBody = targetRow.closest('.month-body');
  if (wkBody && !wkBody.classList.contains('open')) {
    wkBody.classList.add('open');
    wkBody.previousElementSibling?.classList.add('open');
  }
  if (monthBody && !monthBody.classList.contains('open')) {
    monthBody.classList.add('open');
    monthBody.previousElementSibling?.classList.add('open');
  }
  setTimeout(() => targetRow.scrollIntoView({behavior:'smooth', block:'center'}), 50);
}

// ============================================================
//  AUTO OPEN CURRENT WEEK
// ============================================================
function autoOpen() {
  const tod = today0();
  document.querySelectorAll('.week-body').forEach(wb => {
    const rows = wb.querySelectorAll('.session-row[data-date]');
    if (!rows.length) return;
    const dates = Array.from(rows).map(r => +new Date(r.dataset.date));
    const minD = Math.min(...dates), maxD = Math.max(...dates);
    if (minD <= +tod && +tod <= maxD) {
      wb.classList.add('open');
      wb.previousElementSibling?.classList.add('open');
      const mb = wb.closest('.month-body');
      if (mb) { mb.classList.add('open'); mb.previousElementSibling?.classList.add('open'); }
    }
  });
}

// ============================================================
//  FILTER
// ============================================================
let activeFilter = 'all';
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  document.querySelectorAll('#plan .session-row').forEach(row => {
    const wrapper = row.parentElement;
    wrapper.classList.toggle('hidden', f !== 'all' && row.dataset.type !== f);
  });
  document.querySelectorAll('.week-block').forEach(wb => {
    const hasVisible = !!wb.querySelector('.week-body .hidden:not(*) , .week-body > div:not(.hidden)');
    const anyVisible = Array.from(wb.querySelectorAll('.week-body > div')).some(d => !d.classList.contains('hidden'));
    wb.classList.toggle('wk-hidden', !anyVisible && f !== 'all');
  });
}

// ============================================================
//  EXPAND / COLLAPSE
// ============================================================
function expandAll() {
  document.querySelectorAll('.month-toggle, .week-toggle').forEach(t => t.classList.add('open'));
  document.querySelectorAll('.month-body, .week-body').forEach(b => b.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.month-toggle, .week-toggle').forEach(t => t.classList.remove('open'));
  document.querySelectorAll('.month-body, .week-body').forEach(b => b.classList.remove('open'));
}

// ============================================================
//  TABS
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'stats') renderStats();
}

// ============================================================
//  UNITS
// ============================================================
function toggleUnit() {
  useKm = document.getElementById('unitToggle').checked;
  document.getElementById('unit-mi').style.color = useKm ? 'var(--text-muted)' : 'var(--text)';
  document.getElementById('unit-km').style.color = useKm ? 'var(--text)'       : 'var(--text-muted)';
  document.querySelectorAll('.dist-mi').forEach(el => el.style.display = useKm ? 'none' : '');
  document.querySelectorAll('.dist-km').forEach(el => el.style.display = useKm ? '' : 'none');
  // update all data-mi spans
  document.querySelectorAll('[data-mi]').forEach(el => { el.textContent = fmtDist(el.dataset.mi); });
  // update week-mileage data-mi
  document.querySelectorAll('.week-mileage[data-mi]').forEach(el => { el.textContent = fmtDist(el.dataset.mi); });
  // update elev
  document.querySelectorAll('[data-elev]').forEach(el => { el.textContent = fmtElev(el.dataset.elev); });
  if (document.getElementById('view-stats').classList.contains('active')) renderStats();
  renderCalendar();
  renderTodayBar();
}

// ============================================================
//  THEME
// ============================================================
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  if (document.getElementById('view-stats').classList.contains('active')) renderStats();
}

// ============================================================
//  COLOUR-BLIND
// ============================================================
function toggleCB() {
  useCB = !useCB;
  document.documentElement.setAttribute('data-cb', useCB ? 'true' : 'false');
  document.getElementById('cb-btn').classList.toggle('active', useCB);
}

// ============================================================
//  COUNTDOWN + PROGRESS
// ============================================================
function updateStats() {
  const now = new Date();
  const diff = RACE_DATE - now;
  const days = Math.max(0, Math.ceil(diff / 86400000));
  document.getElementById('countdown').textContent = days > 0 ? days : '🏁';
  const total = RACE_DATE - PLAN_START;
  const elapsed = now - PLAN_START;
  const pct = Math.min(100, Math.max(0, Math.round(elapsed/total*100)));
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

// ============================================================
//  MARK TODAY IN LIST
// ============================================================
function markTodayList() {
  const tod = today0();
  document.querySelectorAll('.session-row[data-date]').forEach(row => {
    if (+new Date(row.dataset.date) === +tod) row.classList.add('is-today');
  });
}

// ============================================================
//  INIT
// ============================================================
renderList();
renderCalendar();
autoOpen();
markTodayList();
renderTodayBar();
updateStats();
setInterval(updateStats, 60000);
</script>
