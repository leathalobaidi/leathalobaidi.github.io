<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Vault — Leath Al Obaidi</title>
<style>
  :root{
    --bg:#fafafa; --panel:#fff; --ink:#2a2a2a; --muted:#666; --line:#e8e8e8;
    --accent:#9f442b; --accent-soft:#fef4f1; --maxw:680px;
    --serif:'Newsreader',Georgia,serif;
    --sans:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;font-size:16px;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  .wrap{width:100%;max-width:var(--maxw)}
  h1{font-family:var(--serif);font-size:2rem;font-weight:600;margin-bottom:6px}
  .sub{color:var(--muted);font-size:.95rem;margin-bottom:28px}
  /* gate */
  .gate{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:28px;text-align:center;margin-top:10px}
  .gate p{color:var(--muted);font-size:.92rem;margin-bottom:18px}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  input[type=password]{flex:1;min-width:200px;padding:.75rem 1rem;font-family:var(--sans);font-size:1rem;
    border:1px solid #d4d0c8;border-radius:6px;background:#fff;color:var(--ink)}
  input[type=password]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(159,68,43,.1)}
  button{padding:.75rem 1.4rem;background:var(--accent);color:#fff;border:none;border-radius:6px;
    font-weight:600;font-size:.95rem;cursor:pointer;transition:opacity .2s}
  button:hover{opacity:.88}
  button:disabled{opacity:.5;cursor:default}
  .err{color:var(--accent);font-size:.88rem;margin-top:14px;min-height:1.2em;font-weight:600}
  /* content */
  #content{display:none}
  .group{margin-top:30px}
  .group h2{font-family:var(--serif);font-size:1.15rem;font-weight:600;margin-bottom:12px;
    padding-bottom:8px;border-bottom:1px solid var(--line)}
  .links{list-style:none;display:flex;flex-direction:column;gap:2px}
  .links li a{display:block;padding:9px 12px;border-radius:6px;color:var(--ink);
    text-decoration:none;font-size:.95rem;transition:background .15s,color .15s;white-space:pre-wrap}
  .links li a:hover{background:var(--accent-soft);color:var(--accent)}
  .links li a .u{color:var(--muted);font-size:.78rem;display:block;margin-top:1px}
  .topbar{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
  .lock{background:none;border:1px solid var(--line);color:var(--muted);padding:.4rem .8rem;font-size:.82rem;font-weight:500}
  .lock:hover{opacity:1;border-color:var(--accent);color:var(--accent)}
  footer{margin-top:40px;color:var(--muted);font-size:.82rem;text-align:center}
  @media(max-width:480px){h1{font-size:1.6rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>The Vault</h1>
      <p class="sub">A private index of everything on the site.</p>
    </div>
  </div>

  <!-- password gate -->
  <div class="gate" id="gate">
    <p>Enter the password to reveal the links.</p>
    <form class="row" id="form" autocomplete="off">
      <input type="password" id="pw" placeholder="Password" aria-label="Password" autofocus>
      <button type="submit" id="btn">Unlock</button>
    </form>
    <div class="err" id="err"></div>
  </div>

  <!-- decrypted content -->
  <div id="content"></div>

  <footer>Links are encrypted — nothing is visible until the correct password is entered in your browser.</footer>
</div>

<script>

const $ = s => document.querySelector(s);
const b64ToBytes = b => Uint8Array.from(atob(b), c => c.charCodeAt(0));

async function unlock(pw){
  const enc = new TextEncoder();
  const salt = b64ToBytes(ENC.salt), iv = b64ToBytes(ENC.iv), ct = b64ToBytes(ENC.ct);
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:ENC.iter, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const buf = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct); // throws if wrong pw
  return JSON.parse(new TextDecoder().decode(buf));
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function render(data){
  const c = $("#content");
  let html = '<div class="topbar" style="margin-top:6px"><span class="sub">Unlocked ✓</span>'
    + '<button class="lock" id="relock">Lock</button></div>';
  for(const g of data.groups){
    html += '<div class="group"><h2>'+esc(g.name)+'</h2><ul class="links">';
    for(const [label,url] of g.items){
      html += '<li><a href="'+esc(url)+'">'+esc(label)
        +'<span class="u">'+esc(url)+'</span></a></li>';
    }
    html += '</ul></div>';
  }
  c.innerHTML = html;
  $("#gate").style.display = "none";
  c.style.display = "block";
  $("#relock").addEventListener("click", ()=>location.reload());
}

$("#form").addEventListener("submit", async e=>{
  e.preventDefault();
  const pw = $("#pw").value;
  const err = $("#err"), btn = $("#btn");
  err.textContent = ""; btn.disabled = true; btn.textContent = "Unlocking…";
  try{
    const data = await unlock(pw);
    render(data);
  }catch(_){
    err.textContent = "Wrong password — try again.";
    btn.disabled = false; btn.textContent = "Unlock";
    $("#pw").select();
  }
});
</script>

</html>
